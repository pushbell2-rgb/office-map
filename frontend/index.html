<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>서울숲 사옥 LF층 — 회의실 찾기</title>
  <link rel="stylesheet" href="style.css" />

  <!-- Three.js importmap -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.161.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.161.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>

  <!-- 입장 오버레이 -->
  <div id="join-overlay" class="overlay">
    <div class="overlay-card">
      <div class="overlay-icon">🏢</div>
      <h1 class="overlay-title">서울숲 사옥 LF층</h1>
      <p class="overlay-sub">3D 회의실 찾기 & 위치 공유</p>
      <input
        id="name-input"
        type="text"
        placeholder="이름을 입력하세요"
        maxlength="20"
        autocomplete="off"
      />
      <button id="join-btn" class="btn-join">입장하기</button>
    </div>
  </div>

  <!-- 메인 레이아웃 -->
  <div class="app-layout">

    <!-- 좌측 패널: 방 목록 -->
    <aside class="sidebar left-sidebar">
      <div class="sidebar-header">
        <div class="sidebar-title">🏢 LF층 공간</div>
      </div>
      <div class="search-wrap">
        <input id="search-input" class="search-input" type="text" placeholder="방 이름 또는 번호 검색..." />
      </div>
      <div id="room-list" class="room-list"></div>

      <!-- 범례 -->
      <div class="legend-wrap">
        <div class="legend-title">범례</div>
        <div id="legend" class="legend"></div>
      </div>
    </aside>

    <!-- 중앙: 3D 뷰 -->
    <div class="canvas-wrap">
      <div id="canvas-container"></div>

      <!-- 상단 바 -->
      <div class="top-bar">
        <span class="top-title">서울숲 사옥 LF층 3D 맵</span>
        <div class="top-controls">
          <button id="locate-btn" class="btn-locate">📍 내 위치 설정</button>
        </div>
      </div>

      <!-- 위치 지정 힌트 -->
      <div id="pick-hint" class="pick-hint" hidden>
        바닥을 클릭하여 현재 위치를 지정하세요
      </div>

      <!-- 방 정보 패널 (클릭 시 표시) -->
      <div id="room-info-panel" class="room-info-panel" hidden>
        <button id="room-info-close" class="ri-close">✕</button>
        <div class="ri-id"></div>
        <div class="ri-name"></div>
        <div class="ri-type"></div>
        <button class="ri-nav btn-nav">📍 이 위치로 이동</button>
      </div>

      <!-- 조작 안내 -->
      <div class="hint-bar">
        <span>🖱 드래그: 회전</span>
        <span>🔍 스크롤: 줌</span>
        <span>⌨ 우클릭+드래그: 이동</span>
        <span>🖱 방 클릭: 정보 보기</span>
      </div>
    </div>

    <!-- 우측 패널: 실시간 사용자 -->
    <aside class="sidebar right-sidebar">
      <div class="sidebar-header">
        <div class="sidebar-title">👥 지금 사무실에 <span id="user-count">0</span>명</div>
      </div>
      <div id="user-list" class="user-list">
        <div class="u-empty">위치를 설정한 사람이 없어요</div>
      </div>

      <div class="locate-section">
        <p class="locate-desc">내 위치를 설정하면<br/>다른 사람이 찾아올 수 있어요.</p>
        <button class="btn-locate-side" onclick="document.getElementById('locate-btn').click()">
          📍 내 위치 지금 설정하기
        </button>
      </div>
    </aside>

  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
